<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>张张嘴，摇摇头，智商税秒到账</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-white via-blue-50 to-purple-50">
  <!-- 弹幕层 -->
  <div id="danmakuContainer" class="fixed inset-0 pointer-events-none z-10"></div>

  <!-- 主卡片 -->
  <div class="card-glass p-6 md:p-10 max-w-2xl w-full relative overflow-hidden animate-fade-in">
    <!-- 装饰光效 -->
    <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-200 rounded-full blur-3xl opacity-30"></div>
    <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-orange-200 rounded-full blur-3xl opacity-30"></div>

    <!-- 标题区 -->
    <div class="text-center mb-8 md:mb-12">
      <h1 class="text-4xl md:text-6xl font-black mb-4 text-gradient">
        🚀 极速放款
      </h1>
      <p class="text-xl md:text-2xl text-secondary mb-4">
        3分钟到账 · 无需抵押 · 黑户可贷
      </p>
      <div class="flex flex-col md:flex-row items-center justify-center gap-4 md:gap-8 mt-6">
        <div class="text-5xl md:text-6xl font-bold text-primary">
          ¥ 300,000
        </div>
        <div class="text-base md:text-lg text-muted">
          额度已审批 · 先到先得
        </div>
      </div>
    </div>

    <!-- 倒计时 + 名额 -->
    <div class="flex flex-col md:flex-row justify-center items-center gap-6 md:gap-12 mb-8 md:mb-10">
      <div class="text-center">
        <p class="text-sm text-muted mb-2">⏳ 距离放款截止</p>
        <div id="countdown" class="text-4xl md:text-5xl font-bold text-secondary">02:14:33</div>
      </div>
      <div class="text-center">
        <p class="text-sm text-muted mb-2">🔥 剩余名额</p>
        <div class="text-4xl md:text-5xl font-bold text-danger">2个</div>
      </div>
    </div>

    <!-- 大按钮 -->
    <div class="text-center mb-8">
      <a href="face-check.html" class="btn btn-secondary btn-large inline-flex items-center gap-2">
        <span>💰</span>
        <span>立即领取额度</span>
      </a>
      <p class="text-xs md:text-sm text-muted mt-4">
        ⚠️ 仅限今日 · 先到先得 · 秒批秒放
      </p>
    </div>

    <!-- 统计数据 -->
    <div class="flex flex-col md:flex-row justify-center gap-4 md:gap-8 text-sm">
      <div class="flex items-center gap-2">
        <span class="text-success font-bold">✓</span>
        <span class="text-secondary">审核通过率 98%</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-primary font-bold">⚡</span>
        <span class="text-secondary">平均放款时间 3分钟</span>
      </div>
    </div>

    <!-- 已借款人数 -->
    <p class="text-center text-xs text-muted mt-6">
      已有 <span class="text-primary font-bold">98,462</span> 人成功借款
    </p>
  </div>

  <!-- 底部免责声明 -->
  <footer class="mt-8 text-center text-xs text-muted max-w-md mx-auto px-4">
    <p class="leading-relaxed">
      本项目纯属艺术创作，旨在讽刺某些非正规借贷广告的荒诞性。<br>
      不收集任何人脸数据，不开通任何金融功能。<br>
      警惕过度借贷，珍视个人信用。
    </p>
  </footer>

  <!-- 弹幕脚本 + 倒计时 -->
  <script>
    // ============ 弹幕效果 ============
    const danmakuTexts = [
      '✅ 审核通过率98%',
      '⚡ 秒到账！',
      '🎉 恭喜用户138***456借款成功',
      '💸 已放款¥9,999,999',
      '🔥 仅剩2个名额！',
      '⏰ 3分钟到账',
      '📱 黑户可贷',
      '💰 无抵押 无担保'
    ];

    function createDanmaku() {
      const container = document.getElementById('danmakuContainer');
      const text = danmakuTexts[Math.floor(Math.random() * danmakuTexts.length)];
      const el = document.createElement('div');
      el.className = 'absolute text-sm md:text-base font-medium opacity-70 animate-[float_8s_linear_infinite]';
      el.textContent = text;
      el.style.top = Math.random() * 80 + 10 + '%';
      el.style.left = '100%';
      el.style.color = Math.random() > 0.5 ? '#3b82f6' : '#f97316';
      container.appendChild(el);
      
      setTimeout(() => el.remove(), 8000);
    }

    setInterval(createDanmaku, 1500);

    // ============ 倒计时逻辑 ============
    // 设置截止时间为今天23:59:59
    function updateCountdown() {
      const now = new Date();
      const endOfDay = new Date();
      endOfDay.setHours(23, 59, 59, 999);
      
      const diff = endOfDay - now;
      
      if (diff <= 0) {
        document.getElementById('countdown').textContent = '00:00:00';
        return;
      }
      
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);
      
      const format = (n) => n.toString().padStart(2, '0');
      document.getElementById('countdown').textContent = 
        `${format(hours)}:${format(minutes)}:${format(seconds)}`;
    }

    // 立即更新一次，然后每秒更新
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
