<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核结果 - 张张嘴摇摇头立马贷</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-green-50 via-white to-blue-50">
  <div class="card-glass p-6 md:p-10 max-w-2xl w-full text-center relative overflow-hidden animate-slide-up">
    <!-- 装饰图标 -->
    <div class="absolute top-4 right-4 text-5xl opacity-10">🎭</div>

    <!-- 标题 -->
    <h1 class="text-3xl md:text-4xl font-black mb-4 text-gradient">
      🎉 恭喜您获得<br>
      <span class="text-4xl md:text-5xl block mt-2">"2024年度<br>网贷受害者预备资格"</span>
    </h1>

    <!-- 信用分动画 -->
    <div class="my-8 md:my-10">
      <p class="text-sm md:text-base text-secondary mb-3">您的信用评分</p>
      <div id="score" class="text-6xl md:text-8xl font-bold text-danger animate-bounce-in">-9999</div>
      <p class="text-xs md:text-sm text-muted mt-3">
        （低于-9000分将被列为高风险用户）
      </p>
    </div>

    <!-- 表情包 -->
    <div class="my-8 text-6xl md:text-8xl animate-float">
      🥲
    </div>

    <!-- 讽刺文案 -->
    <div class="bg-red-50 border border-red-200 rounded-xl p-4 md:p-6 mb-8">
      <p class="text-base md:text-lg leading-relaxed">
        <span class="text-success font-bold">恭喜！</span> 您已成功通过所有荒诞审核<br>
        下一步：准备迎接催收电话、高额利息、以及<br>
        <span class="text-secondary font-bold">"身份盗用"</span> 大礼包！
      </p>
    </div>

    <!-- 按钮组 -->
    <div class="flex flex-col gap-3 md:gap-4">
      <a href="https://www.bilibili.com/video/BV1示例视频ID" target="_blank" class="btn btn-primary btn-large w-full md:w-auto">
        🎬 查看反讽视频（推荐）
      </a>
      <a href="http://www.pbc.gov.cn/消保局" target="_blank" class="btn btn-ghost w-full md:w-auto">
        📚 学习金融知识（央行消保局）
      </a>
      <button onclick="location.reload()" class="text-xs md:text-sm text-muted hover:text-secondary mt-2">
        再试一次（假装我没贷）
      </button>
    </div>
  </div>

  <!-- 底部免责声明 -->
  <footer class="mt-8 text-center text-xs text-muted max-w-md mx-auto px-4">
    <p class="leading-relaxed">
      ⚠️ 本项目纯属艺术创作，讽刺某些非正规借贷广告。<br>
      不收集任何人脸数据，不开通任何金融功能。<br>
      请勿模仿，警惕真实借贷风险。
    </p>
  </footer>

  <!-- 信用分滚动动画 -->
  <script>
    const scoreEl = document.getElementById('score');
    let score = 0;
    const target = -9999;
    const duration = 2500;
    const startTime = Date.now();

    function animateScore() {
      const elapsed = Date.now() - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3); // easeOutCubic
      score = Math.floor(target * ease);
      scoreEl.textContent = score;

      if (progress < 1) {
        requestAnimationFrame(animateScore);
      } else {
        scoreEl.textContent = target;
        scoreEl.classList.add('animate-pulse');
      }
    }

    animateScore();
  </script>
</body>
</html>
