<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核结果 - 张张嘴摇摇头立马贷</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-green-50 via-white to-blue-50">
  <div class="card-glass p-6 md:p-10 max-w-2xl w-full text-center relative overflow-hidden animate-slide-up">
    <!-- 装饰图标 -->
    <div class="absolute top-4 right-4 text-5xl opacity-10">🎭</div>

    <!-- 标题 -->
    <h1 class="text-3xl md:text-4xl font-black mb-4 text-gradient">
      🎉 恭喜您获得<br>
      <span class="text-4xl md:text-5xl block mt-2">"<span id="currentYear"></span>年度<br>网贷受害者预备资格"</span>
    </h1>

    <!-- 信用分动画 -->
    <div class="my-8 md:my-10">
      <p class="text-sm md:text-base text-secondary mb-3">您的信用评分</p>
      <div id="score" class="text-6xl md:text-8xl font-bold text-danger animate-bounce-in">-9999</div>
      <p class="text-xs md:text-sm text-muted mt-3">
        （低于-9000分将被列为高风险用户）
      </p>
    </div>

    <!-- 表情包 -->
    <div class="my-8 text-6xl md:text-8xl animate-float">
      🥲
    </div>

    <!-- 讽刺文案 -->
    <div class="bg-red-50 border border-red-200 rounded-xl p-4 md:p-6 mb-8">
      <p class="text-base md:text-lg leading-relaxed">
        <span class="text-success font-bold">恭喜！</span> 您已成功通过所有荒诞审核<br>
        下一步：准备迎接催收电话、高额利息、以及<br>
        <span class="text-secondary font-bold">"身份盗用"</span> 大礼包！
      </p>
    </div>

    <!-- 按钮组 -->
    <div class="flex flex-col gap-3 md:gap-4">
      <!-- 贷款套路贷警示视频 -->
      <a href="https://b23.tv/RlrzWAq" target="_blank" class="btn btn-primary btn-large w-full md:w-auto">
        🎬 观看：借款13万要还1300万？套路贷陷阱
      </a>
      
      <!-- 反诈中心案例 -->
      <a href="https://fzapph5.gjfzpt.cn/#/case/caseList" target="_blank" class="btn btn-ghost w-full md:w-auto">
        📚 反诈中心：贷款诈骗案例库
      </a>
      
      <!-- 反诈APP下载 -->
      <a href="https://fzapph5.gjfzpt.cn/QRCode/" target="_blank" class="btn btn-secondary w-full md:w-auto">
        📱 下载国家反诈中心APP
      </a>
      
      <!-- 再试一次（返回首页） -->
      <button onclick="window.location.href='index.html'" class="text-xs md:text-sm text-muted hover:text-secondary mt-2">
        🔄 再试一次（假装我没贷）
      </button>
    </div>

    <!-- 一键分享按钮 -->
    <div class="mt-6 pt-6 border-t border-gray-200">
      <button id="shareBtn" class="btn btn-primary w-full md:w-auto">
        📋 一键分享（复制文案）
      </button>
      <p id="shareMsg" class="text-xs text-muted mt-2 hidden">
        ✅ 文案已复制到剪切板！
      </p>
    </div>
  </div>

  <!-- 底部免责声明 -->
  <footer class="mt-8 text-center text-xs text-muted max-w-md mx-auto px-4">
    <p class="leading-relaxed">
      ⚠️ 本项目纯属艺术创作，讽刺某些非正规借贷广告。<br>
      不收集任何人脸数据，不开通任何金融功能。<br>
      请勿模仿，警惕真实借贷风险。
    </p>
  </footer>

  <!-- 信用分滚动动画 + 动态年份 + 分享功能 -->
  <script>
    // ============ 动态年份 ============
    document.getElementById('currentYear').textContent = new Date().getFullYear();

    // ============ 信用分动画 ============
    const scoreEl = document.getElementById('score');
    let score = 0;
    const target = -9999;
    const duration = 2500;
    const startTime = Date.now();

    function animateScore() {
      const elapsed = Date.now() - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      score = Math.floor(target * ease);
      scoreEl.textContent = score;

      if (progress < 1) {
        requestAnimationFrame(animateScore);
      } else {
        scoreEl.textContent = target;
        scoreEl.classList.add('animate-pulse');
      }
    }

    animateScore();

    // ============ 分享功能 ============
    // 多个搞笑文案（内置）
    const shareTexts = [
      `我刚通过了"张张嘴摇摇头立马贷"的审核，额度高达30,000,000元！张嘴就放款，摇头就通过，简直不要太离谱😱 快来体验这个荒诞过程：https://meme-loan-3.pages.dev/`,

      `这个贷款页面太离谱了！让我张嘴摇头就批了3000万额度，全程不到20秒🤣 你敢信？试试看：https://meme-loan-3.pages.dev/`,

      `笑死，这个"金融APP"让我张嘴摇头就给了我30,000,000额度，还说是"2024年度网贷受害者预备资格"😂 快来感受荒诞：https://meme-loan-3.pages.dev/`,

      `紧急分享：这个页面模拟了网贷审核的荒诞流程，张嘴→摇头→到账，额度居然有3000万！快来试试：https://meme-loan-3.pages.dev/`,

      `亲测有效！这个页面让我做了几个奇怪的表情就通过了"审核"，额度30,000,000元🎉 速度太快了，链接：https://meme-loan-3.pages.dev/`
    ];

    const shareBtn = document.getElementById('shareBtn');
    const shareMsg = document.getElementById('shareMsg');

    shareBtn.addEventListener('click', async () => {
      // 随机选一个文案
      const text = shareTexts[Math.floor(Math.random() * shareTexts.length)];

      try {
        await navigator.clipboard.writeText(text);
        shareMsg.classList.remove('hidden');
        shareBtn.textContent = '✅ 已复制（再点一次）';
        
        // 2秒后恢复按钮文字
        setTimeout(() => {
          shareBtn.textContent = '📋 一键分享（复制文案）';
          shareMsg.classList.add('hidden');
        }, 2000);
      } catch (err) {
        // 降级方案：选中文本
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        
        shareMsg.classList.remove('hidden');
        shareBtn.textContent = '✅ 已复制';
        setTimeout(() => {
          shareBtn.textContent = '📋 一键分享（复制文案）';
          shareMsg.classList.add('hidden');
        }, 2000);
      }
    });
  </script>
</body>
</html>
