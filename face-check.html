<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人脸识别验证 - 张张嘴摇摇头立马贷</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-blue-50 via-white to-purple-50">
  <div class="card-glass p-6 md:p-10 max-w-2xl w-full text-center">
    <!-- 标题 -->
    <h1 class="text-2xl md:text-3xl font-bold mb-2 text-gradient">
      🔐 智能人脸识别
    </h1>
    <p class="text-sm md:text-base text-secondary mb-6 md:mb-8">
      请根据提示完成动作验证 · 纯模拟演示
    </p>

    <!-- 模拟摄像头区域（静态图片 + 动画） -->
    <div class="relative w-full max-w-md mx-auto mb-8">
      <div class="aspect-video bg-gradient-to-br from-blue-100 to-purple-100 rounded-2xl border-4 border-primary shadow-lg overflow-hidden flex items-center justify-center">
        <!-- 模拟人脸图标 -->
        <div id="faceIcon" class="text-8xl md:text-9xl transition-all duration-300">
          😊
        </div>
      </div>
      
      <!-- 扫描线动画 -->
      <div id="scanLine" class="absolute left-0 right-0 h-1 bg-primary/50 shadow-lg hidden">
        <div class="absolute left-1/2 -translate-x-1/2 w-8 h-8 bg-primary rounded-full border-4 border-white shadow"></div>
      </div>

      <!-- 动作提示图标 -->
      <div id="actionIcon" class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-4xl bg-white rounded-full w-16 h-16 flex items-center justify-center shadow-lg border-2 border-primary">
        📸
      </div>
    </div>

    <!-- 提示语 -->
    <div id="prompt" class="text-xl md:text-2xl font-bold mb-4 text-primary min-h-[3rem] flex items-center justify-center">
      正在启动识别系统...
    </div>

    <!-- 进度条 -->
    <div class="progress-track mb-2">
      <div id="progress" class="progress-fill" style="width: 0%"></div>
    </div>
    <p id="status" class="text-xs md:text-sm text-muted mb-8">准备中...</p>

    <!-- 跳转按钮（完成后显示） -->
    <a id="nextBtn" href="result.html" class="btn btn-primary btn-large hidden w-full md:w-auto">
      🎉 查看结果
    </a>
  </div>

  <!-- 底部说明 -->
  <footer class="mt-8 text-center text-xs text-muted max-w-md mx-auto px-4">
    <p>🔒 本页面为纯前端模拟，不调用摄像头，不收集任何数据</p>
  </footer>

  <script>
    const promptEl = document.getElementById('prompt');
    const progressEl = document.getElementById('progress');
    const statusEl = document.getElementById('status');
    const faceIcon = document.getElementById('faceIcon');
    const actionIcon = document.getElementById('actionIcon');
    const scanLine = document.getElementById('scanLine');
    const nextBtn = document.getElementById('nextBtn');

    // 动作序列（纯模拟，无摄像头）
    const actions = [
      { text: '📸 正在检测人脸...', icon: '📸', face: '😊', progress: 10, duration: 1200 },
      { text: '😱 请张大嘴巴，像被催收吓到一样', icon: '😱', face: '😮', progress: 30, duration: 2500 },
      { text: '🙀 请用力摇头，表示"我没有网贷"', icon: '🙀', face: '😵', progress: 50, duration: 2500 },
      { text: '👁️ 请眨眨眼，证明你还清醒', icon: '👁️', face: '😉', progress: 70, duration: 2000 },
      { text: '⏳ 正在分析信用状况...', icon: '💭', face: '🤔', progress: 90, duration: 1500 },
      { text: '✅ 验证通过！', icon: '✅', face: '😎', progress: 100, duration: 1000 }
    ];

    let currentAction = 0;

    // 更新 UI
    function updateUI(action) {
      promptEl.textContent = action.text;
      actionIcon.textContent = action.icon;
      faceIcon.textContent = action.face;
      progressEl.style.width = action.progress + '%';
      statusEl.textContent = `进度: ${action.progress}%`;

      // 扫描线显示控制（20%-80% 进度显示）
      if (action.progress >= 20 && action.progress <= 80) {
        scanLine.classList.remove('hidden');
      } else {
        scanLine.classList.add('hidden');
      }
    }

    // 动作序列执行
    function runActionSequence() {
      if (currentAction >= actions.length) {
        finishCheck();
        return;
      }

      const action = actions[currentAction];
      updateUI(action);
      currentAction++;

      setTimeout(runActionSequence, action.duration);
    }

    // 完成处理 - 2.5秒后跳转
    function finishCheck() {
      promptEl.innerHTML = '<span class="text-success">🎉 验证通过！正在跳转...</span>';
      statusEl.textContent = '已完成';
      actionIcon.classList.add('hidden');
      scanLine.classList.add('hidden');
      nextBtn.classList.remove('hidden');
      
      // 2.5秒后自动跳转到结果页
      setTimeout(() => {
        window.location.href = 'result.html';
      }, 2500);
    }

    // 启动
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(runActionSequence, 500);
    });

    // 添加扫描线动画样式
    const style = document.createElement('style');
    style.textContent = `
      @keyframes scan {
        0% { top: 0%; opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
